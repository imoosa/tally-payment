<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Maktronic Debtors</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 12px;
  }
  .logo h1 { color: #fff; font-size: 22px; font-weight: 700; }
  .logo p  { color: #94a3b8; font-size: 13px; margin-top: 4px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 6px; font-weight: 500; }
  input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: #fff;
    font-size: 16px; /* 16px prevents iOS auto-zoom */
    transition: all 0.2s; outline: none;
    -webkit-appearance: none;
  }
  input:focus { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    border: none; border-radius: 10px;
    color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
    -webkit-appearance: none; touch-action: manipulation;
  }
  .btn:hover  { opacity: 0.9; }
  .btn:active { opacity: 0.8; transform: scale(0.99); }
  .error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171; padding: 10px 14px;
    border-radius: 8px; font-size: 13px; margin-bottom: 16px;
  }
  .hint { color: #475569; font-size: 12px; text-align: center; margin-top: 18px; }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; border-radius: 16px; }
    .logo h1 { font-size: 20px; }
    .logo-icon { width: 56px; height: 56px; font-size: 24px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💊</div>
    <h1>Maktronic Medical</h1>
    <p>Sundry Debtors Portal</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit">Sign In →</button>
  </form>
  <p class="hint">admin / admin123 &nbsp;|&nbsp; manager / manager123</p>
</div>
</body>
</html>
